{% set name = "earthengine-api" %}
{% set version = "1.4.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5ba26dceef09aca91b610280bde2ee819638aaeba2dd3cf44252ce4862f36d55

build:
  number: 0
  entry_points:
    - earthengine = ee.cli.eecli:main
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  skip: true  # [py<39]

requirements:
  host:
    - python 
    - pip
    - setuptools
    - wheel
  run:
    - google-api-python-client >=1.12.1
    - google-auth >=1.4.1
    - google-auth-httplib2 >=0.0.3
    - google-cloud-storage
    - httplib2 >=0.9.2,<1dev
    - python
    - requests

test:
  source_files:
    - ee/tests
  requires:
    - python
    - pip
    - pytest
    - absl-py
    - geopandas
  imports:
    - ee
    - ee.cli
  commands:
    - earthengine --help
    - pip check
    - pytest -vv ee/tests

about:
  home: https://earthengine.google.com/
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Earth Engine Python API
  description: |
    The Earth Engine Python API allows developers to interact with
    Google Earth Engine, a web platform for global scale geospatial analysis.
  doc_url: https://developers.google.com/earth-engine/
  dev_url: https://github.com/google/earthengine-api/

extra:
  recipe-maintainers:
    - naschmitz
    - bengalin
    - dag-ee
    - dotstarmoney
    - joannalcy
    - michaelfdewitt
    - mike-d-d
    - saicheems
    - schwehr
    - sufyanAbbasi
    - twotabbies
    - jgarcia525
